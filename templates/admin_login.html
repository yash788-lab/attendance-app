{% extends 'base.html' %}
{# Import the card macro #}
{% from "components/card.html" import render_card %}

{% block title %}Teacher Login{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 10vh auto; position: relative;">
    
    <!-- Background ornament glow -->
    <div style="position: absolute; width: 100%; height: 100%; background: var(--primary-grad); filter: blur(60px); opacity: 0.15; z-index: 0; left: 0; top: 0; border-radius: 50%;"></div>
    
    {% call render_card("🔐 Teacher Login") %}
        
        <form method="POST">
            <div class="form-group">
                <label for="password">Admin Key</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter Admin Key" required>
            </div>

            <button type="submit" class="btn btn-success" style="width: 100%;">Login</button>
        </form>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <div style="text-align: center;">
            <a href="{{ url_for('main.login') }}" class="auth-link" style="text-decoration: none; font-size: 14px; color: #666;">
                Are you a student? <strong>Login here</strong>
            </a>
        </div>

    {% endcall %}

</div>
{% endblock %}
