<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="School ERP — Student Login">
    <title>Student Login — School ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            background: #0c1628;
            color: #f1f5f9;
        }
        .auth-left {
            flex: 1;
            background: linear-gradient(145deg, #064e3b 0%, #065f46 40%, #047857 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }
        .auth-left::before {
            content:''; position:absolute;
            width:450px; height:450px; border-radius:50%;
            background: rgba(16,185,129,.1);
            top:-120px; right:-120px;
        }
        .auth-left::after {
            content:''; position:absolute;
            width:280px; height:280px; border-radius:50%;
            background: rgba(6,182,212,.08);
            bottom:-70px; left:-50px;
        }
        .brand { position:relative; z-index:1; }
        .logo-box {
            width:64px; height:64px;
            background: rgba(16,185,129,.25);
            border: 1px solid rgba(16,185,129,.4);
            border-radius:16px;
            display:flex; align-items:center; justify-content:center;
            font-size:2rem; margin-bottom:28px;
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    },
                    colors: { primary: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' } }
                }
            }
        }
    </script>
</head>
<body class="font-sans text-gray-600 bg-gray-50 flex min-h-screen">

    <!-- Left Branding Panel -->
    <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-gray-900 flex-col justify-center items-start p-16">
        <div class="absolute inset-0">
            <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Students" class="w-full h-full object-cover opacity-30 mix-blend-luminosity">
            <div class="absolute inset-0 bg-gradient-to-r from-gray-900 to-gray-900/60"></div>
        </div>
        
        <div class="relative z-10 max-w-lg">
            <div class="w-16 h-16 bg-primary-600 rounded-2xl flex items-center justify-center mb-8 shadow-lg shadow-primary-500/30">
                <span class="text-white font-heading font-bold text-3xl">🎓</span>
            </div>
            <h1 class="text-5xl font-heading font-bold text-white mb-6 leading-tight">Student<br><span class="text-primary-400">Portal</span></h1>
            <p class="text-xl text-gray-300 mb-10 leading-relaxed">Access your grades, check attendance, and stay updated with class announcements.</p>
            
            <div class="space-y-4">
                <div class="flex items-center gap-4 text-gray-300">
                    <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center border border-white/10">📈</div>
                    <span>Track your academic progress</span>
                </div>
                <div class="flex items-center gap-4 text-gray-300">
                    <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center border border-white/10">🔔</div>
                    <span>Get important notifications</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Form Panel -->
    <div class="w-full lg:w-1/2 flex flex-col justify-center items-center p-8 sm:p-12">
        <div class="w-full max-w-md">
            <!-- Mobile Header -->
            <div class="lg:hidden text-center mb-10">
                <div class="w-16 h-16 bg-primary-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary-500/30">
                    <span class="text-white font-heading font-bold text-3xl">🎓</span>
                </div>
                <h2 class="text-3xl font-heading font-bold text-gray-900">Student Portal</h2>
            </div>

            <div class="mb-10">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary-50 text-primary-700 text-sm font-medium mb-4">
                    <span class="w-2 h-2 rounded-full bg-primary-500"></span>
                    Student Login
                </div>
                <h2 class="text-3xl font-heading font-bold text-gray-900 mb-2">Welcome back</h2>
                <p class="text-gray-500">Please enter your details to sign in.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-6 p-4 rounded-xl text-sm font-medium border {% if category in ('error','danger') %}bg-red-50 text-red-700 border-red-200{% elif category == 'warning' %}bg-amber-50 text-amber-700 border-amber-200{% elif category == 'success' %}bg-green-50 text-green-700 border-green-200{% else %}bg-blue-50 text-blue-700 border-blue-200{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('main.student_login') }}" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Student Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-gray-400">✉️</span>
                        </div>
                        <input type="email" id="email" name="email" placeholder="student@school.edu" required autocomplete="email"
                               class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all text-gray-900 placeholder-gray-400 bg-white">
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <span class="text-xs text-primary-600">Default is your roll number</span>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-gray-400">🔒</span>
                        </div>
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"
                               class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all text-gray-900 placeholder-gray-400 bg-white">
                    </div>
                </div>
                
                <button type="submit" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-base font-semibold text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition duration-200">
                    Sign In
                </button>
            </form>

            <div class="mt-10 flex justify-center gap-4 text-sm font-medium">
                <a href="{{ url_for('main.login') }}" class="text-gray-500 hover:text-primary-600 transition-colors">Teacher Login</a>
                <span class="text-gray-300">|</span>
                <a href="{{ url_for('main.admin_login') }}" class="text-gray-500 hover:text-primary-600 transition-colors">Admin Login</a>
            </div>
            <div class="mt-6 text-center">
                <a href="{{ url_for('public.home') }}" class="text-sm text-primary-600 hover:text-primary-700 hover:underline">← Back to Website</a>
            </div>
        </div>
    </div>
</body>
</html>
