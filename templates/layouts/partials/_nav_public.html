<style>
.pub-header__icon-btn {
    width: 48px;
    height: 48px;

    color: var(--color-secondary);
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;

.pub-header__icon-btn:hover {

}

.pub-nav-overlay__sublist {
    list-style: none;
    padding: 0;
    display: none;
    flex-direction: column;
    gap: var(--space-4);
    margin: var(--space-4) 0;
    width: 100%;
}

.pub-nav-overlay__dropdown.is-open .pub-nav-overlay__sublist {
    display: flex;
}

.pub-nav-overlay__sublist a {
    font-size: var(--text-lg);
    text-decoration: none;
    color: var(--color-secondary);
    opacity: 0.6;
    transition: opacity 300ms;
}

.pub-nav-overlay__sublist a:hover {
    opacity: 1;
}

.dropdown-icon-chevron {
    transition: transform 0.3s ease;
}

.pub-nav-overlay__dropdown.is-open .dropdown-icon-chevron {
    transform: rotate(180deg);
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const trigger = document.querySelector('.pub-nav-overlay__dropdown-trigger');
    const dropdown = document.querySelector('.pub-nav-overlay__dropdown');
    
    if (trigger && dropdown) {
        trigger.addEventListener('click', (e) => {
            dropdown.classList.toggle('is-open');
        });
    }
});
</script>
