{% extends 'layouts/public_base.html' %}
{% block title %}Gallery - School Excellence{% endblock %}
{% block content %}
<div class="py-20 bg-gray-50 min-h-[70vh]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-4xl font-heading font-bold text-gray-900 mb-8 text-center">Life on Campus</h1>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <img src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=600&q=80" alt="Campus" class="rounded-xl object-cover w-full h-48 hover:scale-105 transition duration-300">
            <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?w=600&q=80" alt="Classroom" class="rounded-xl object-cover w-full h-48 hover:scale-105 transition duration-300">
            <img src="https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=600&q=80" alt="Sports" class="rounded-xl object-cover w-full h-48 hover:scale-105 transition duration-300">
            <img src="https://images.unsplash.com/photo-1568667256549-094345857637?w=600&q=80" alt="Library" class="rounded-xl object-cover w-full h-48 hover:scale-105 transition duration-300">
            <img src="https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=600&q=80" alt="Students" class="rounded-xl object-cover w-full h-48 hover:scale-105 transition duration-300">
            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=600&q=80" alt="Teacher" class="rounded-xl object-cover w-full h-48 hover:scale-105 transition duration-300">
        </div>
    </div>
</div>
{% endblock %}
