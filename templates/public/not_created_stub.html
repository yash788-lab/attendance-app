{% extends 'layouts/base_public.html' %}

{% block title %}{{ title }} - {{ site_config.school_name }}{% endblock %}

{% block content %}
<section class="section" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; background: var(--color-surface-off);">
    <div class="container">
        <dotlottie-player 
            src="/static/css/public/assets/lottie-animation1.lottie" 
            background="transparent" 
            speed="0.5" 
            style="width: 300px; height: 300px; margin: 0 auto; opacity: 0.5;" 
            loop autoplay>
        </dotlottie-player>
        <h1 style="font-family: var(--font-script); font-size: 4rem; color: var(--color-secondary); margin-bottom: var(--space-4);">Not created yet!</h1>
        <p style="font-size: var(--text-lg); opacity: 0.6; max-width: 600px; margin: 0 auto;">
            We are currently crafting this section to bring you the best experience. Check back soon for updates!
        </p>
        <a href="{{ url_for('public.home') }}" class="pub-btn pub-btn--yellow" style="margin-top: var(--space-10);">BACK TO HOME</a>
    </div>
</section>
{% endblock %}
